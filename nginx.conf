server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # HTML sempre revalida no servidor — atualizações aparecem no primeiro F5
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
  }
  location = / {
    add_header Cache-Control "no-cache";
  }
  # service worker e manifest também revalidam sempre
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location ~* \.webmanifest$ {
    add_header Cache-Control "no-cache";
    types { application/manifest+json webmanifest; }
  }
}
