<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SurgeNote — iddeia</title>
<meta name="theme-color" content="#12384A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --marca:#1D5468;
  --verde:var(--marca);
  --verde-escuro:color-mix(in srgb, var(--marca) 72%, #04140F);
  --verde-tinta:color-mix(in srgb, var(--marca) 14%, #FFFFFF);
  --titulo:var(--verde-escuro);
  --papel:#F4F6F3; --branco:#FFFFFF; --grafite:#1C2421; --cinza:#5C6662; --linha:#DCE3DF;
  --display:"Bricolage Grotesque",sans-serif; --corpo:"Instrument Sans",sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --papel:color-mix(in srgb, var(--marca) 14%, #090D10);
    --branco:color-mix(in srgb, var(--marca) 20%, #0C1216);
    --grafite:#E9EEF1; --cinza:color-mix(in srgb, var(--marca) 24%, #98A6AD);
    --linha:color-mix(in srgb, var(--marca) 26%, #1B2429);
    --verde-tinta:color-mix(in srgb, var(--marca) 30%, #0C1216);
    --titulo:color-mix(in srgb, var(--marca) 34%, #EAF1F5);
  }
}
@supports not (color: color-mix(in srgb, red, blue)){
  :root{--verde-escuro:#123647;--verde-tinta:#DCE8ED;--titulo:#123647}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--corpo);background:var(--papel);color:var(--grafite);min-height:100vh;display:flex;flex-direction:column}
.hero{
  background:linear-gradient(160deg, var(--verde-escuro), color-mix(in srgb, var(--marca) 55%, #06131A));
  color:#fff;text-align:center;padding:52px 24px 44px;
}
.hero img{width:76px;height:76px;border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.35);margin-bottom:14px}
.hero h1{font-family:var(--display);font-weight:700;font-size:2.1rem;letter-spacing:.2px}
.hero p{opacity:.85;font-size:1.02rem;margin-top:6px}
.hero .selo{display:block;font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;opacity:.55;margin-top:14px}
.opcoes{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:36px 24px 56px}
.card{max-width:460px;width:100%}
a.opcao{display:flex;align-items:center;gap:14px;background:var(--branco);border:1px solid var(--linha);border-radius:12px;padding:20px;margin-bottom:14px;text-decoration:none;color:inherit;transition:border-color .15s, box-shadow .15s}
a.opcao:hover{border-color:var(--verde);box-shadow:0 6px 20px color-mix(in srgb, var(--marca) 18%, transparent)}
a.opcao .txt{flex:1}
a.opcao h2{font-family:var(--display);font-size:1.05rem;color:var(--titulo);margin-bottom:4px}
a.opcao p{font-size:.86rem;color:var(--cinza)}
a.opcao .seta{color:var(--verde);flex-shrink:0}
a.opcao.destaque{background:var(--verde);border-color:var(--verde)}
a.opcao.destaque h2{color:#fff}
a.opcao.destaque p{color:rgba(255,255,255,.75)}
a.opcao.destaque .seta{color:#fff}
a.opcao.destaque:hover{filter:brightness(1.07)}
@media (max-width:480px){.hero{padding:36px 20px 30px}.hero h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="hero">
  <img src="icon-192.png" alt="SurgeNote">
  <h1>SurgeNote</h1>
  <p>Sua produção cirúrgica, ditada por WhatsApp.</p>
  <span class="selo" style="display:flex;align-items:center;justify-content:center;gap:8px">por <img src="iddeia-logo-branca.png" alt="iddeia" style="width:88px;height:auto;vertical-align:middle;opacity:.9"></span>
</div>
<div class="opcoes">
  <div class="card">
    <a class="opcao destaque" href="dashboard_gestor_cirurgico.html">
      <div class="txt"><h2>Painel do médico</h2><p>Já tenho conta — produção, agenda, valores e relatórios.</p></div>
      <svg class="seta" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <a class="opcao" href="cadastro.html">
      <div class="txt"><h2>Criar minha conta</h2><p>Sou médico(a) e quero começar a usar.</p></div>
      <svg class="seta" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <a class="opcao" href="dashboard_gestao_iddeia.html">
      <div class="txt"><h2>Gestão iddeia</h2><p>Acesso restrito da equipe iddeia.</p></div>
      <svg class="seta" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>
</div>
</body>
</html>
