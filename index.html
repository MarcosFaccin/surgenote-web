<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SurgeNote — iddeia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--verde:#0E5A4E;--verde-escuro:#083A33;--verde-tinta:#DDEEE9;--papel:#F4F6F3;--branco:#fff;--grafite:#1C2421;--cinza:#5C6662;--linha:#DCE3DF;
--display:"Bricolage Grotesque",sans-serif;--corpo:"Instrument Sans",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--corpo);background:var(--papel);color:var(--grafite);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:440px;width:100%;text-align:center}
.marca{font-family:var(--display);font-weight:700;font-size:1.15rem;color:var(--verde-escuro);margin-bottom:8px}
p.sub{color:var(--cinza);font-size:.95rem;margin-bottom:28px}
a.opcao{display:block;background:var(--branco);border:1px solid var(--linha);border-radius:12px;padding:20px;margin-bottom:14px;text-decoration:none;color:inherit;text-align:left;transition:border-color .15s}
a.opcao:hover{border-color:var(--verde)}
a.opcao h2{font-family:var(--display);font-size:1.05rem;color:var(--verde-escuro);margin-bottom:4px}
a.opcao p{font-size:.86rem;color:var(--cinza)}
</style>
</head>
<body>
<div class="card">
  <div class="marca">● SurgeNote · iddeia</div>
  <p class="sub">Gestão cirúrgica por WhatsApp + painel web</p>
  <a class="opcao" href="cadastro.html"><h2>Criar minha conta</h2><p>Sou médico(a) e quero começar a usar.</p></a>
  <a class="opcao" href="dashboard_gestor_cirurgico.html"><h2>Painel do médico</h2><p>Já tenho conta — produção, agenda, valores e relatórios.</p></a>
  <a class="opcao" href="dashboard_gestao_iddeia.html"><h2>Gestão iddeia</h2><p>Acesso restrito da equipe iddeia.</p></a>
</div>
</body>
</html>
